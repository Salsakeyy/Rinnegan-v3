# Gauntlet anchor configuration
#
# One anchor per line. Blank lines and lines starting with '#' are ignored.
# Fields are separated by '|' (pipe):
#
#   NAME | ELO | CMD | UCI_OPTIONS
#
# - NAME         : short label shown in the report (no spaces)
# - ELO          : the anchor's reference Elo (approximate, at this TC)
# - CMD          : absolute path to the engine binary
# - UCI_OPTIONS  : space-separated "option.Name=Value" pairs passed to fastchess
#
# Stockfish is used at several UCI_Elo settings as a multi-point anchor.
# Stockfish's UCI_Elo option (engine option, not CCRL rating) is only
# approximate, so we use several points and combine.
#
# CMD is looked up via PATH when it's a bare name (so "stockfish" works on
# both macOS Homebrew and Linux apt installs). Use an absolute path if you
# want a specific binary.

SF_1320 | 1320 | stockfish | option.UCI_LimitStrength=true option.UCI_Elo=1320
SF_1600 | 1600 | stockfish | option.UCI_LimitStrength=true option.UCI_Elo=1600
SF_1900 | 1900 | stockfish | option.UCI_LimitStrength=true option.UCI_Elo=1900
SF_2200 | 2200 | stockfish | option.UCI_LimitStrength=true option.UCI_Elo=2200
SF_2500 | 2500 | stockfish | option.UCI_LimitStrength=true option.UCI_Elo=2500
